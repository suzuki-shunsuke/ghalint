---
name: Release
on:
  push:
    tags: [v*]
jobs:
  release:
    uses: suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml@feat-use-takumi-guard
    secrets:
      TAKUMI_GUARD_BOT_ID: ${{secrets.TAKUMI_GUARD_BOT_ID}}
    with:
      aqua_version: v2.59.1
      go-version-file: go.mod
    permissions:
      contents: write
      id-token: write
      actions: read
      attestations: write
