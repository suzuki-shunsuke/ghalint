---
name: test (workflow_call)
on:
  workflow_call:
    secrets:
      TAKUMI_GUARD_BOT_ID:
        required: true
permissions: {}
jobs:
  test:
    uses: suzuki-shunsuke/go-test-full-workflow/.github/workflows/test.yaml@feat-takumi-guard-for-golang
    with:
      aqua_version: v2.59.1
      golangci-lint-timeout: 120s
    secrets:
      TAKUMI_GUARD_BOT_ID: ${{secrets.TAKUMI_GUARD_BOT_ID}}
    permissions:
      pull-requests: write
      contents: read
      id-token: write
